<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Chat Doodle</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="chat-shell" aria-label="채팅앱">
        <header class="topbar">
          <div>
            <p class="eyebrow">Shared chat</p>
            <h1>Simple Chat</h1>
          </div>
          <button class="tool-button" id="drawToggle" type="button">낙서 켜기</button>
        </header>

        <section class="messages" id="messages" aria-live="polite">
          <article class="message other">
            <span>Chat</span>
            <p>두 컴퓨터에서 같은 주소로 들어오면 메시지가 같이 보입니다.</p>
          </article>
        </section>

        <form class="composer" id="chatForm">
          <input
            id="messageInput"
            type="text"
            autocomplete="off"
            placeholder="메시지를 입력하세요"
            aria-label="메시지"
          />
          <button type="submit">보내기</button>
        </form>
      </section>

      <section class="doodle-panel" aria-label="낙서 도구">
        <label>
          색상
          <input id="drawColor" type="color" value="#f05a3f" />
        </label>
        <label>
          굵기
          <input id="drawSize" type="range" min="2" max="28" value="8" />
        </label>
        <button id="clearCanvas" type="button">낙서 지우기</button>
      </section>
    </main>

    <canvas id="doodleCanvas" aria-hidden="true"></canvas>
    <script src="app.js"></script>
  </body>
</html>
